<script>
/* ---- Footer: auto copyright year ---- */
document.getElementById('footerYear').textContent = new Date().getFullYear();

/* ---- Sidebar search ---- */
function sidebarSearch() {
    var word = document.getElementById("sidebarInput").value.trim();
    var resultEl = document.getElementById("sidebarResult");
    if (!word) {
        resultEl.innerHTML = "<em>Please enter a word.</em>";
        return;
    }
    if (typeof window.dictSearch === "function") {
        window.dictSearch(word, resultEl);
    } else {
        resultEl.innerHTML = "<em>Dictionary not available.</em>";
    }
}

/* ---- Hamburger menu ---- */
(function () {
    const hamburger = document.getElementById('hamburger');
    const siteNav   = document.getElementById('siteNav');
    const overlay   = document.getElementById('navOverlay');

    function closeNav() {
        siteNav.classList.remove('open');
        overlay.classList.remove('active');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        overlay.setAttribute('aria-hidden', 'true');
    }

    function openNav() {
        siteNav.classList.add('open');
        overlay.classList.add('active');
        hamburger.classList.add('open');
        hamburger.setAttribute('aria-expanded', 'true');
        overlay.setAttribute('aria-hidden', 'false');
    }

    hamburger.addEventListener('click', function () {
        if (siteNav.classList.contains('open')) { closeNav(); } else { openNav(); }
    });

    overlay.addEventListener('click', closeNav);

    /* Close nav via the X button inside the drawer */
    const navCloseBtn = document.getElementById('navCloseBtn');
    if (navCloseBtn) { navCloseBtn.addEventListener('click', closeNav); }

    /* Close nav when a link is clicked on mobile */
    siteNav.querySelectorAll('.nav-link').forEach(function (link) {
        link.addEventListener('click', closeNav);
    });
})();

/* ---- Cycling theme toggle ---- */
(function () {
    const STORAGE_KEY = 'theme-preference';
    const CYCLE = ['device', 'light', 'dark'];
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    const btn = document.getElementById('themeCycleBtn');

    const LABELS = { light: 'Light', dark: 'Dark', device: 'Device' };
    const TITLES = {
        light:  'Currently: Light mode — click for Dark',
        dark:   'Currently: Dark mode — click for Device',
        device: 'Currently: Device setting — click for Light'
    };

    function applyTheme(pref) {
        const isDark = pref === 'dark' || (pref === 'device' && prefersDark.matches);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        btn.setAttribute('data-theme-pref', pref);
        btn.querySelector('.theme-label').textContent = LABELS[pref];
        btn.title = TITLES[pref];
        btn.setAttribute('aria-label', TITLES[pref]);
    }

    /* Restore saved preference on load */
    const savedPref = localStorage.getItem(STORAGE_KEY) || 'device';
    applyTheme(savedPref);

    btn.addEventListener('click', function () {
        const current = localStorage.getItem(STORAGE_KEY) || 'device';
        const next    = CYCLE[(CYCLE.indexOf(current) + 1) % CYCLE.length];
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    });

    /* React to OS preference changes when in "device" mode */
    prefersDark.addEventListener('change', function () {
        const current = localStorage.getItem(STORAGE_KEY) || 'device';
        if (current === 'device') { applyTheme('device'); }
    });
})();

/* ---- Color-legend info button ---- */
(function () {
    const infoBtn   = document.getElementById('textareaInfoBtn');
    const infoPopup = document.getElementById('textareaInfoPopup');
    if (!infoBtn || !infoPopup) return;

    infoBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        infoPopup.hidden = !infoPopup.hidden;
    });

    document.addEventListener('click', function () {
        infoPopup.hidden = true;
    });

    infoPopup.addEventListener('click', function (e) {
        e.stopPropagation();
    });
})();
</script>
