<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>German Gender Detector</title>

    <!-- CSS PATH -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<h1>German Noun Gender Detector</h1>

<div class="container">

    <!-- INPUT -->

    <!-- OUTPUT -->

        <h2>Output</h2>
        <div id="output"></div>
    </div>

</div>

<!-- JS PATHS (IMPORTANT ORDER) -->
<script src="assets/js/dictionary.js"></script>

</body>
</html>
