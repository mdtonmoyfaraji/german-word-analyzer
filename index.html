<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Word Analyser</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Apply saved theme before page renders to avoid flash -->
    <script>
    (function(){
        const pref = localStorage.getItem('theme-preference') || 'device';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = pref === 'dark' || (pref === 'device' && prefersDark);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
    </script>
</head>
<body>

<div class="page-container">

    <!-- PAGE HEADER: title + theme switcher -->
    <div class="page-header">
        <h1>German Word Analyser</h1>
        <div class="theme-switcher">
            <button class="theme-btn" data-theme-val="light" title="Light mode">☀️ Light</button>
            <button class="theme-btn" data-theme-val="dark"  title="Dark mode">🌙 Dark</button>
            <button class="theme-btn" data-theme-val="device" title="Use device setting">💻 Device</button>
        </div>
    </div>

    <div class="layout">

        <!-- LEFT COLUMN (80%) -->
        <main class="col-main">
            <div class="box">

                <!-- TEXTAREA -->
                <textarea id="inputText" placeholder="Paste text..."></textarea>

                <!-- OUTPUT -->
                <div id="output" style="display:none;"></div>

                <!-- BUTTONS -->
                <div class="buttons">
                    <button onclick="detectGender()">Analyse</button>
                    <button onclick="editText()">Edit</button>
                    <button onclick="clearText()">Clear</button>
                </div>

            </div>
        </main>

        <!-- RIGHT COLUMN (20%) — Dictionary Sidebar -->
        <aside class="col-sidebar" aria-label="Dictionary search">

            <div class="sidebar-search">
                <label for="sidebarInput" class="sidebar-label">Dictionary Search</label>
                <div class="sidebar-input-row">
                    <input
                        id="sidebarInput"
                        type="text"
                        placeholder="Type a word…"
                        aria-label="Search word"
                        onkeydown="if(event.key==='Enter') sidebarSearch()"
                    />
                    <button onclick="sidebarSearch()">Search</button>
                </div>
            </div>

            <div id="sidebarResult" class="sidebar-result" aria-live="polite"></div>

        </aside>

    </div><!-- /.layout -->

</div><!-- /.page-container -->

<script src="assets/js/hover-addon.js"></script>
<script src="assets/js/dictionary.js"></script>
<script src="assets/js/script.js"></script>

<script>
/* ---- Sidebar search ---- */
function sidebarSearch() {
    var word = document.getElementById("sidebarInput").value.trim();
    var resultEl = document.getElementById("sidebarResult");
    if (!word) {
        resultEl.innerHTML = "<em>Please enter a word.</em>";
        return;
    }
    if (typeof window.dictSearch === "function") {
        window.dictSearch(word, resultEl);
    } else {
        resultEl.innerHTML = "<em>Dictionary not available.</em>";
    }
}

/* ---- Theme switcher ---- */
(function () {
    var STORAGE_KEY = 'theme-preference';
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme(pref) {
        var isDark = pref === 'dark' || (pref === 'device' && prefersDark.matches);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.querySelectorAll('.theme-btn').forEach(function (btn) {
            btn.classList.toggle('active', btn.dataset.themeVal === pref);
        });
    }

    // Apply saved preference and mark active button
    var savedPref = localStorage.getItem(STORAGE_KEY) || 'device';
    applyTheme(savedPref);

    // Button clicks
    document.querySelectorAll('.theme-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            var val = btn.dataset.themeVal;
            localStorage.setItem(STORAGE_KEY, val);
            applyTheme(val);
        });
    });

    // React to OS-level preference changes (for "device" mode)
    prefersDark.addEventListener('change', function () {
        var current = localStorage.getItem(STORAGE_KEY) || 'device';
        if (current === 'device') applyTheme('device');
    });
})();
</script>

</body>
</html>
